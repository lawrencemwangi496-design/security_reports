---
name: security_scan
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'security scan'
        required: true
        default: full_scan
        type: choice
        options:
          - full_scan
          - internal scan
          - external scan

jobs:
  external_scan:
    runs-on: ubuntu-latest
    if: >
     github.event_name == 'schedule' ||
     github.event.inputs.scan_type == 'external scan' ||
      github.event.inputs.scan_type == 'full_scan'
    steps:
      - name: nmap scan
        run: sudo apt-get update && sudo apt-get install nmap -y
      - run: mkdir -p scan_results
      - run: |
          nmap -p- -sV -T4 ${{ secrets.SERVER_IP }} -oN scan_results/nmap_scan.txt
      - name: upload scan_results
        uses: actions/upload-artifact@v4
        with:
          name: scan_report folder
          path: scan_results
          retention-days: 5